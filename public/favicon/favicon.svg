<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500" width="500" height="500"><defs>
        <!-- SHADOWS -->
        <filter id="shadow_cross">
            <feOffset result="offOut" in="SourceAlpha" dx="5" dy="5"></feOffset>
            <feGaussianBlur result="blurOut" in="offOut" stdDeviation="3"></feGaussianBlur>
            <feBlend in="SourceGraphic" in2="blurOut" mode="normal"></feBlend>
        </filter>
        <filter id="shadow_church">
            <feOffset result="offOut" in="SourceAlpha" dx="2" dy="2"></feOffset>
            <feGaussianBlur result="blurOut" in="offOut" stdDeviation="3"></feGaussianBlur>
            <feBlend in="SourceGraphic" in2="blurOut" mode="normal"></feBlend>
        </filter>
        
        <!-- MASKS -->
        <mask id="church_mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white"></rect>
            <path style="stroke: black; stroke-width: 2; fill: black;" d="M 75 272 C 80 230, 80 230, 75 189 C 80 185, 80 180, 75 176 H 139 C 134 180, 134, 185, 139 189 C 134 230, 134 230, 139 272 Z"></path>
        </mask>
        <mask id="red_mask">
            <rect x="0" y="0" width="100%" height="100%" fill="black"></rect>
            <path d="M26 350 A 245 245 0 0 0 474 150 C 430 190,350 250,250 250 S 70 310, 26 350 Z" stroke-width="7" fill="white" stroke="white"></path>
        </mask>
        <mask id="blue_mask">
            <rect width="1366" height="768" fill="black"></rect>
            <path d="M 26 350 C -50.98 177.565 87.574 -13.541 275.397 6.01 C 362.567 15.084 438.273 69.973 474 150 C 430 190 350 250 250 250 C 150 250 70 310 26 350 Z" stroke-width="7" fill="white" stroke="white"></path>
        </mask>
        

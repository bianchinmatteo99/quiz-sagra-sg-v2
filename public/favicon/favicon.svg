                <path d="M174 125 h6 v7 h4 v-7 h6 v7 h4 v-7 h6 v7 h4 v-7 h6 v7 h4 v-7 h6 v7 h4 v-7 h6 v7 h4 v-7 h7 z" fill="rgb(230,230,230)" stroke="black"></path>
                <rect x="180" y="141" width="55" height="88" fill="transparent" stroke="black"></rect>

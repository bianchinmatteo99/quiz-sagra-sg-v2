                <path style="stroke: black; stroke-width: 2; fill: transparent;" d="M 55 176 H 75 M 159 176 H 139 M 55 272 H 75"></path>
                <path style="stroke: rgb(70,70,70); stroke-width: 1; fill: transparent;" d="M 56 189 H 74 M 158 189 H 140"></path>
            </g>
            
            <!--Corn ears-->

            <use width="80" height="80" transform="matrix(0.8529250025749207, 0.5220358371734619, -0.5220358371734619, 0.8529250025749207, 159.19593811035156, 50.63975143432617)" xlink:href="#grano"></use>
            <use width="80" height="80" transform="matrix(0.7864367961883545, 0.6176691651344299, -0.6176691651344299, 0.7864367961883545, 171.50320434570312, 66.95635223388672)" xlink:href="#grano"></use>

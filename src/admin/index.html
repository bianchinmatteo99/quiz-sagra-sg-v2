<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <title>SGQuiz - Admin</title>

    <script type="module" src="../firebase-init.ts"></script>

    <link rel="stylesheet" href="../css/pico/css/pico.min.css">
    <link rel="stylesheet" media="screen" href="index.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <header class="container-fluid">
        <h1>Admin Dashboard - <span id="quiz-title"></span></h1>
        <div><label>
                <input id="mostra-segreti" name="secrets" type="checkbox" role="switch" />
                MOSTRA SEGRETI
            </label></div>
    </header>
    <main id="main-container" class="container-fluid">
        <aside id="quiz-timeline" class="sidebar">
            <div id="quiz-advance-button-container"></div>
            <div id="quiz-timeline-container"></div>
        </aside>

        <div class="resizer col-resizer"></div>

        <main class="col">
            <section id="game-timeline" class="panel top"></section>
            <div class="resizer row-resizer"></div>
            <article id="game-current-state" class="panel bottom">
                <div id="game-current-state-content"></div>
                <!--<footer><button>Test</button></footer>-->
            </article>
        </main>

        <div class="resizer col-resizer"></div>

        <main class="col">
            <section class="panel top">
                <table class="striped">
                    <thead>
                        <tr>
                            <th scope="col">Nome</th>
                            <th scope="col">Punti</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="people-list-container"></tbody>
                </table>
            </section>
            <div class="resizer row-resizer"></div>
            <article id="question-container" class="panel bottom">
                <div id="question-answers-container">
                    <table class="striped">
                        <thead>
                            <tr>
                                <th scope="col">Nome</th>
                                <th scope="col">Risposta</th>
                                <th scope="col"></th>
                            </tr>
                        </thead>
                        <tbody id="question-answers"></tbody>
                    </table>
                </div>
                <footer id="question-actions"></footer>
            </article>
        </main>
    </main>

    <dialog id="quiz-choice-dialog">
        <article>
            <header>
                <h2>Quiz Load Choice</h2>
            </header>
            <p>Select which quiz source to load:</p>
            <p><strong>Note:</strong> Loading from file will delete the database quiz.</p>
            <footer>
                <button id="quiz-load-file" type="button">Load from File</button>
                <button id="quiz-load-db-continue" type="button">Load from Database (Continue)</button>
                <button id="quiz-load-db-restart" type="button">Load from Database (Restart)</button>
            </footer>
        </article>
    </dialog>

    <dialog id="person-actions-dialog">
        <article>
            <header>
                <h2>Azioni per <span id="person-dialog-name"></span></h2>
            </header>
            <fieldset role="group" aria-describedby="points-label">
                <input type="number" name="points" value="100" />
                <input type="submit" value="Salva" />
            </fieldset>
            <small id="points-label">Modifica il punteggio</small>
            <div role="group">
                <button id="person-dialog-cancel" class="secondary">Annulla</button>
                <button id="person-dialog-delete" class="delete">Elimina</button>
            </div>
        </article>
    </dialog>

    <script type="module" src="../auth/check-auth.ts"></script>
    <script type="module" src="./index.ts"></script>
</body>

</html>
